<!DOCTYPE html>
<html>
<head>
  <style>
    html, body { margin: 0; padding: 0; }
    body {
      width: 720pt; height: 405pt;
      box-sizing: border-box;
      padding: 40pt;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #000000;
      color: #FFFFFF;
      font-family: 'Helvetica', Arial, sans-serif;
      overflow: hidden;
    }
    .header-border {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 8pt;
      background-color: #C5A059;
    }
    h1 {
      color: #C5A059;
      font-size: 42pt;
      margin: 0 0 10pt 0;
      text-align: center;
    }
    .highlight {
      font-size: 72pt;
      font-weight: bold;
      color: #FFFFFF;
      margin: 0 0 20pt 0;
    }
    .subtitle {
      font-size: 28pt;
      color: #C5A059;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="header-border"></div>
  <h1>Ingreso Potencial (Nivel Capitán)</h1>
  <p class="highlight">$90,000+ / Año</p>
  <p class="subtitle">Libertad Financiera & Liderazgo</p>
</body>
</html>
