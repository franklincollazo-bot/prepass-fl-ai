<!DOCTYPE html>
<html>
<head>
  <style>
    html, body { margin: 0; padding: 0; }
    body {
      width: 720pt; height: 405pt;
      box-sizing: border-box;
      padding: 30pt;
      display: flex;
      flex-direction: column;
      background-color: #000000;
      color: #FFFFFF;
      font-family: 'Helvetica', Arial, sans-serif;
      overflow: hidden;
    }
    .header {
      display: flex;
      align-items: center;
      margin-bottom: 15pt;
    }
    .header-accent {
      width: 6pt;
      height: 30pt;
      background-color: #C5A059;
      margin-right: 15pt;
    }
    h1 {
      color: #C5A059;
      font-size: 28pt;
      margin: 0;
    }
    .main-box {
      flex: 1;
      min-height: 0;
      background-color: #1A1A1A;
      border-radius: 12pt;
      padding: 20pt;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15pt;
      padding-bottom: 8pt;
      border-bottom: 1pt solid #333;
    }
    .row:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }
    .label {
      font-size: 18pt;
      color: #C5A059;
      margin: 0;
    }
    .value {
      font-size: 24pt;
      font-weight: bold;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-accent"></div>
    <h1>Cálculo Mensual del Capitán</h1>
  </div>
  <div class="main-box">
    <div class="row">
      <p class="label">Producción Total (154 x $350 AP)</p>
      <p class="value">$53,900</p>
    </div>
    <div class="row">
      <p class="label">Spread del Capitán (Promedio 10%)</p>
      <p class="value">$5,390</p>
    </div>
    <div class="row">
      <p class="label">Bonos y Overrides Adicionales</p>
      <p class="value">$2,110</p>
    </div>
    <div class="row" style="border-top: 2pt solid #C5A059; padding-top: 10pt; margin-top: 5pt;">
      <p class="label" style="font-weight: bold; color: #FFF;">INGRESO TOTAL MENSUAL</p>
      <p class="value" style="color: #C5A059; font-size: 32pt;">$7,500</p>
    </div>
  </div>
</body>
</html>
