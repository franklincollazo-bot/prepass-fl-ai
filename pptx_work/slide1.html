<!DOCTYPE html>
<html>
<head>
  <style>
    html, body { margin: 0; padding: 0; }
    body {
      width: 720pt; height: 405pt;
      box-sizing: border-box;
      padding: 40pt;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #000000;
      color: #FFFFFF;
      font-family: 'Helvetica', Arial, sans-serif;
      overflow: hidden;
    }
    .footer-border {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 8pt;
      background-color: #C5A059;
    }
    h1 {
      color: #C5A059;
      font-size: 48pt;
      margin-bottom: 12pt;
      text-align: center;
      font-weight: bold;
    }
    p {
      font-size: 24pt;
      text-align: center;
      margin: 0;
    }
    .accent {
      width: 120pt;
      height: 4pt;
      background-color: #C5A059;
      margin-bottom: 24pt;
    }
  </style>
</head>
<body>
  <h1>SET4LIFE</h1>
  <div class="accent"></div>
  <p>ILUSTRACIONES DE INGRESOS</p>
  <p style="font-size: 18pt; margin-top: 12pt; opacity: 0.8;">Modelos de Liderazgo para Team Captains</p>
  <div class="footer-border"></div>
</body>
</html>
