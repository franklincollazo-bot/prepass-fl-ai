<!DOCTYPE html>
<html>
<head>
  <style>
    html, body { margin: 0; padding: 0; }
    body {
      width: 720pt; height: 405pt;
      box-sizing: border-box;
      padding: 40pt;
      display: flex;
      flex-direction: column;
      background-color: #000000;
      color: #FFFFFF;
      font-family: 'Helvetica', Arial, sans-serif;
      overflow: hidden;
    }
    .header {
      display: flex;
      align-items: center;
      margin-bottom: 20pt;
    }
    .header-accent {
      width: 6pt;
      height: 40pt;
      background-color: #C5A059;
      margin-right: 15pt;
    }
    h1 {
      color: #C5A059;
      font-size: 32pt;
      margin: 0;
    }
    .stats-container {
      flex: 1;
      min-height: 0;
      display: flex;
      justify-content: space-around;
      align-items: center;
      gap: 20pt;
    }
    .stat-card {
      text-align: center;
      background-color: #1A1A1A;
      padding: 30pt;
      border-radius: 50%;
      width: 180pt;
      height: 180pt;
      display: flex;
      flex-direction: column;
      justify-content: center;
      border: 4pt solid #C5A059;
    }
    .stat-val {
      font-size: 42pt;
      font-weight: bold;
      color: #FFFFFF;
    }
    .stat-label {
      font-size: 16pt;
      color: #C5A059;
      text-transform: uppercase;
      margin-top: 10pt;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-accent"></div>
    <h1>El Efecto Multiplicador</h1>
  </div>
  <div class="stats-container">
    <div class="stat-card">
      <p class="stat-val">10</p>
      <p class="stat-label">Agentes</p>
    </div>
    <div class="stat-card" style="border-style: dashed;">
      <p class="stat-val">X5</p>
      <p class="stat-label">Crecimiento</p>
    </div>
    <div class="stat-card">
      <p class="stat-val">50</p>
      <p class="stat-label">Agentes</p>
    </div>
  </div>
  <p style="text-align: center; font-size: 20pt; margin-top: 20pt; color: #C5A059;">Proyección a 12-18 meses con sistema de duplicación.</p>
</body>
</html>
