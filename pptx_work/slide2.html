<!DOCTYPE html>
<html>
<head>
  <style>
    html, body { margin: 0; padding: 0; }
    body {
      width: 720pt; height: 405pt;
      box-sizing: border-box;
      padding: 40pt;
      display: flex;
      flex-direction: column;
      background-color: #000000;
      color: #FFFFFF;
      font-family: 'Helvetica', Arial, sans-serif;
      overflow: hidden;
    }
    .header {
      display: flex;
      align-items: center;
      margin-bottom: 20pt;
    }
    .header-accent {
      width: 6pt;
      height: 40pt;
      background-color: #C5A059;
      margin-right: 15pt;
    }
    h1 {
      color: #C5A059;
      font-size: 32pt;
      margin: 0;
    }
    .content {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .metric {
      font-size: 60pt;
      font-weight: bold;
      color: #FFFFFF;
      margin: 0 0 10pt 0;
    }
    .submetric {
      font-size: 24pt;
      color: #C5A059;
      margin: 0 0 30pt 0;
    }
    .note {
      font-size: 18pt;
      text-align: center;
      max-width: 500pt;
      line-height: 1.4;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-accent"></div>
    <h1>Meta de Ingresos Anuales</h1>
  </div>
  <div class="content">
    <p class="metric">$500,000 / Año</p>
    <p class="submetric">$41,667 Mensuales</p>
    <p class="note">Meta alcanzada exclusivamente mediante el spread del equipo, asumiendo una organización estable y producción activa.</p>
  </div>
</body>
</html>
